<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 20px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 20px;
    }

    .card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-label {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 4px;
    }

    .card-value {
      font-size: 22px;
      font-weight: bold;
      color: var(--tg-theme-text-color, #000);
    }

    .card-value.green { color: #27ae60; }
    .card-value.red   { color: #e74c3c; }

    .invoice-list { margin-top: 20px; }

    .invoice-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }

    .invoice-name { font-size: 14px; font-weight: bold; }
    .invoice-date { font-size: 12px; color: var(--tg-theme-hint-color, #888); margin-top: 2px; }

    .invoice-amount { font-size: 15px; font-weight: bold; }
    .invoice-amount.paid   { color: #27ae60; }
    .invoice-amount.unpaid { color: #e74c3c; }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 4px;
    }
    .badge.paid   { background: #d5f5e3; color: #1e8449; }
    .badge.unpaid { background: #fadbd8; color: #c0392b; }

    .close-btn {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Finance Summary</h2>
  <p class="subtitle" id="greeting">Hello!</p>

  <!-- Summary Cards -->
  <div class="card">
    <div class="card-label">Total Invoices</div>
    <div class="card-value">5</div>
  </div>

  <div style="display:flex; gap:12px;">
    <div class="card" style="flex:1">
      <div class="card-label">Paid</div>
      <div class="card-value green">3</div>
    </div>
    <div class="card" style="flex:1">
      <div class="card-label">Unpaid</div>
      <div class="card-value red">2</div>
    </div>
  </div>

  <!-- Invoice List -->
  <div class="invoice-list">
    <div class="card-label" style="margin-bottom:10px;">Recent Invoices</div>

    <div class="invoice-item">
      <div>
        <div class="invoice-name">Invoice #1001</div>
        <div class="invoice-date">2026-03-28</div>
        <span class="badge paid">Paid</span>
      </div>
      <div class="invoice-amount paid">$500.00</div>
    </div>

    <div class="invoice-item">
      <div>
        <div class="invoice-name">Invoice #1002</div>
        <div class="invoice-date">2026-03-29</div>
        <span class="badge unpaid">Unpaid</span>
      </div>
      <div class="invoice-amount unpaid">$750.00</div>
    </div>

    <div class="invoice-item">
      <div>
        <div class="invoice-name">Invoice #1003</div>
        <div class="invoice-date">2026-03-30</div>
        <span class="badge paid">Paid</span>
      </div>
      <div class="invoice-amount paid">$200.00</div>
    </div>

    <div class="invoice-item">
      <div>
        <div class="invoice-name">Invoice #1004</div>
        <div class="invoice-date">2026-03-30</div>
        <span class="badge unpaid">Unpaid</span>
      </div>
      <div class="invoice-amount unpaid">$1,200.00</div>
    </div>

    <div class="invoice-item">
      <div>
        <div class="invoice-name">Invoice #1005</div>
        <div class="invoice-date">2026-03-30</div>
        <span class="badge paid">Paid</span>
      </div>
      <div class="invoice-amount paid">$350.00</div>
    </div>
  </div>

  <button class="close-btn" onclick="window.Telegram.WebApp.close()">Close</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    if (user?.first_name) {
      document.getElementById('greeting').textContent = 'Hello, ' + user.first_name + '!';
    }
  </script>

</body>
</html>
