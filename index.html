<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, Arial, sans-serif;
      background: var(--tg-theme-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000);
      padding-bottom: 70px;
      min-height: 100vh;
    }

    /* ── Tab Pages ── */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--tg-theme-secondary-bg-color, #fff);
      display: flex;
      border-top: 1px solid rgba(0,0,0,0.08);
      z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px 6px; cursor: pointer; user-select: none;
      font-size: 10px; color: var(--tg-theme-hint-color, #999);
      border: none; background: none;
    }
    .nav-item .icon { font-size: 20px; margin-bottom: 2px; }
    .nav-item.active { color: var(--tg-theme-button-color, #2481cc); }

    /* ── Cards ── */
    .card {
      background: var(--tg-theme-secondary-bg-color, #fff);
      border-radius: 14px; padding: 16px; margin-bottom: 12px;
    }
    .card-label { font-size: 12px; color: var(--tg-theme-hint-color, #888); margin-bottom: 4px; }
    .card-value { font-size: 28px; font-weight: 700; }
    .card-row { display: flex; gap: 10px; }
    .card-row .card { flex: 1; }

    /* ── Section Title ── */
    .section-title {
      font-size: 13px; font-weight: 600;
      color: var(--tg-theme-hint-color, #888);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }

    /* ── List Items ── */
    .list-item {
      background: var(--tg-theme-secondary-bg-color, #fff);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    }
    .list-item .name { font-size: 14px; font-weight: 600; }
    .list-item .sub  { font-size: 12px; color: var(--tg-theme-hint-color, #888); margin-top: 3px; }
    .badge {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      border-radius: 20px; margin-top: 5px;
      background: #d5f5e3; color: #1e8449;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    .btn-primary {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-secondary {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Template Tabs ── */
    .tmpl-tabs {
      display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto;
      scrollbar-width: none;
    }
    .tmpl-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 13px;
      border: none; cursor: pointer; white-space: nowrap;
      background: var(--tg-theme-secondary-bg-color, #e8e8e8);
      color: var(--tg-theme-text-color, #000);
    }
    .tmpl-tab.active {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
    }

    /* ── Textarea ── */
    textarea {
      width: 100%; min-height: 220px; border-radius: 12px; padding: 12px;
      font-size: 13px; font-family: monospace; resize: vertical;
      border: 1.5px solid rgba(0,0,0,0.1);
      background: var(--tg-theme-secondary-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      outline: none; line-height: 1.5;
    }
    textarea:focus { border-color: var(--tg-theme-button-color, #2481cc); }

    /* ── Placeholders chips ── */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .chip {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: rgba(36,129,204,0.12); color: var(--tg-theme-button-color, #2481cc);
      cursor: pointer; border: none; font-family: monospace;
    }
    .chip:hover { background: rgba(36,129,204,0.25); }

    /* ── Blast textarea ── */
    .blast-textarea {
      width: 100%; min-height: 120px; border-radius: 12px; padding: 12px;
      font-size: 14px; resize: vertical;
      border: 1.5px solid rgba(0,0,0,0.1);
      background: var(--tg-theme-secondary-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      outline: none;
    }
    .blast-textarea:focus { border-color: var(--tg-theme-button-color, #2481cc); }

    /* ── Status / Loading ── */
    .status-msg {
      text-align: center; padding: 20px;
      font-size: 13px; color: var(--tg-theme-hint-color, #888);
    }
    .result-ok  { color: #27ae60; font-size: 13px; margin-top: 4px; }
    .result-err { color: #e74c3c; font-size: 13px; margin-top: 4px; }

    .meta-info {
      font-size: 11px; color: var(--tg-theme-hint-color, #aaa);
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- ── PAGE: Home ── -->
  <div id="page-home" class="page active">
    <div class="card-row" style="margin-top:4px;">
      <div class="card">
        <div class="card-label">Linked Groups</div>
        <div class="card-value" id="home-linked">—</div>
      </div>
      <div class="card">
        <div class="card-label">Templates</div>
        <div class="card-value" id="home-templates">—</div>
      </div>
    </div>

    <div class="section-title">Quick Actions</div>
    <button class="btn btn-primary" onclick="switchTab('blast')">📢 Send Blast Message</button>
    <button class="btn btn-secondary" onclick="switchTab('groups')" style="margin-top:8px;">🔗 View Linked Groups</button>
    <button class="btn btn-secondary" onclick="switchTab('templates')" style="margin-top:8px;">📝 Edit Templates</button>
  </div>

  <!-- ── PAGE: Groups ── -->
  <div id="page-groups" class="page">
    <div class="section-title">Linked Groups</div>
    <div id="groups-list"><div class="status-msg">Loading...</div></div>
  </div>

  <!-- ── PAGE: Templates ── -->
  <div id="page-templates" class="page">
    <div class="section-title">Message Templates</div>
    <div class="tmpl-tabs" id="tmpl-tabs"></div>

    <div id="tmpl-editor" style="display:none;">
      <textarea id="tmpl-body" placeholder="Loading template..."></textarea>
      <div class="card-label" style="margin-top:10px;">Available Placeholders (tap to insert)</div>
      <div class="chips" id="tmpl-chips"></div>
      <div class="meta-info" id="tmpl-meta"></div>
      <button class="btn btn-primary" id="tmpl-save-btn" onclick="saveTemplate()">Save Template</button>
      <div id="tmpl-result"></div>
    </div>

    <div id="tmpl-loading" class="status-msg">Loading templates...</div>
  </div>

  <!-- ── PAGE: Blast ── -->
  <div id="page-blast" class="page">
    <div class="section-title">Blast Message</div>
    <div class="card">
      <div class="card-label">Template Preview</div>
      <div id="blast-preview" style="font-size:13px; margin-top:8px; white-space:pre-wrap; font-family:monospace; color:var(--tg-theme-hint-color,#888)">Loading...</div>
    </div>

    <div class="section-title">Your Message</div>
    <textarea class="blast-textarea" id="blast-msg" placeholder="Type your announcement here..."></textarea>
    <div class="meta-info" id="blast-target">Sending to — groups</div>
    <button class="btn btn-danger" id="blast-btn" onclick="confirmBlast()">📢 Send to All Groups</button>
    <div id="blast-result"></div>
  </div>

  <!-- ── Bottom Navigation ── -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home"      onclick="switchTab('home')">
      <span class="icon">🏠</span>Home Github
    </button>
    <button class="nav-item"        id="nav-groups"    onclick="switchTab('groups')">
      <span class="icon">🔗</span>Groups
    </button>
    <button class="nav-item"        id="nav-templates" onclick="switchTab('templates')">
      <span class="icon">📝</span>Templates
    </button>
    <button class="nav-item"        id="nav-blast"     onclick="switchTab('blast')">
      <span class="icon">📢</span>Blast
    </button>
  </nav>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────
    const API_BASE = "https://tg.gold6688.biz";
    const API_KEY  = "mdbo-secure-key-2024";
    // ────────────────────────────────────────────────────────────────

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    const HEADERS = {
      'x-api-key': API_KEY,
      'Content-Type': 'application/json'
    };

    // ── Tab switching ─────────────────────────────────────────────
    const TABS = ['home', 'groups', 'templates', 'blast'];
    function switchTab(tab) {
      TABS.forEach(t => {
        document.getElementById(`page-${t}`).classList.toggle('active', t === tab);
        document.getElementById(`nav-${t}`).classList.toggle('active', t === tab);
      });
      if (tab === 'groups')    loadGroups();
      if (tab === 'templates') loadTemplates();
      if (tab === 'blast')     loadBlast();
    }

    // ── Home ──────────────────────────────────────────────────────
    async function loadHome() {
      try {
        const [g, t] = await Promise.all([
          fetch(`${API_BASE}/api/webapp/linked-agents`, { headers: HEADERS }),
          fetch(`${API_BASE}/api/templates`, { headers: HEADERS })
        ]);
        if (g.ok) {
          const gd = await g.json();
          document.getElementById('home-linked').textContent = gd.total;
        }
        if (t.ok) {
          const td = await t.json();
          document.getElementById('home-templates').textContent = td.templates.length;
        }
      } catch (_) {}
    }

    // ── Groups ───────────────────────────────────────────────────
    let groupsLoaded = false;
    async function loadGroups() {
      if (groupsLoaded) return;
      const el = document.getElementById('groups-list');
      try {
        const res = await fetch(`${API_BASE}/api/webapp/linked-agents`, { headers: HEADERS });
        if (!res.ok) throw new Error(`${res.status}`);
        const data = await res.json();
        groupsLoaded = true;
        if (!data.agents.length) {
          el.innerHTML = '<div class="status-msg">No linked groups yet.</div>';
          return;
        }
        el.innerHTML = data.agents.map(a => `
          <div class="list-item">
            <div class="name">Agent #${a.agent_id}</div>
            <div class="sub">📋 ${a.group_name}</div>
            <div class="sub">Activated by: ${a.activated_by} · ${a.linked_at}</div>
            <span class="badge">Linked</span>
          </div>`).join('');
      } catch (e) {
        el.innerHTML = `<div class="status-msg result-err">Error: ${e.message}</div>`;
      }
    }

    // ── Templates ────────────────────────────────────────────────
    let allTemplates = [];
    let activeTemplateKey = null;
    let templatesLoaded = false;

    async function loadTemplates() {
      if (templatesLoaded) return;
      try {
        const res = await fetch(`${API_BASE}/api/templates`, { headers: HEADERS });
        if (!res.ok) throw new Error(`${res.status}`);
        const data = await res.json();
        allTemplates = data.templates;
        templatesLoaded = true;

        document.getElementById('tmpl-loading').style.display = 'none';
        document.getElementById('tmpl-editor').style.display = 'block';

        // Build tabs
        const tabsEl = document.getElementById('tmpl-tabs');
        tabsEl.innerHTML = allTemplates.map(t =>
          `<button class="tmpl-tab" onclick="selectTemplate('${t.key}')">${t.name}</button>`
        ).join('');

        if (allTemplates.length) selectTemplate(allTemplates[0].key);
      } catch (e) {
        document.getElementById('tmpl-loading').textContent = `Error: ${e.message}`;
      }
    }

    function selectTemplate(key) {
      activeTemplateKey = key;
      const tmpl = allTemplates.find(t => t.key === key);
      if (!tmpl) return;

      // Update tab highlight
      document.querySelectorAll('.tmpl-tab').forEach((el, i) => {
        el.classList.toggle('active', allTemplates[i].key === key);
      });

      document.getElementById('tmpl-body').value = tmpl.body;
      document.getElementById('tmpl-meta').textContent =
        `Last saved: ${tmpl.updated_at} by ${tmpl.updated_by}`;
      document.getElementById('tmpl-result').textContent = '';

      // Chips
      const chips = document.getElementById('tmpl-chips');
      chips.innerHTML = (tmpl.placeholders || []).map(p =>
        `<button class="chip" onclick="insertPlaceholder('${p}')">${p}</button>`
      ).join('');
    }

    function insertPlaceholder(placeholder) {
      const ta = document.getElementById('tmpl-body');
      const start = ta.selectionStart;
      const val = ta.value;
      ta.value = val.slice(0, start) + placeholder + val.slice(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = start + placeholder.length;
      ta.focus();
    }

    async function saveTemplate() {
      if (!activeTemplateKey) return;
      const btn = document.getElementById('tmpl-save-btn');
      const result = document.getElementById('tmpl-result');
      const body = document.getElementById('tmpl-body').value.trim();
      if (!body) return;

      btn.disabled = true;
      btn.textContent = 'Saving...';
      result.textContent = '';

      try {
        const res = await fetch(`${API_BASE}/api/templates/${activeTemplateKey}`, {
          method: 'PUT',
          headers: HEADERS,
          body: JSON.stringify({ template_body: body, updated_by: user?.username || user?.first_name || 'webapp' })
        });
        if (!res.ok) throw new Error(`${res.status}`);

        // Update local cache
        const tmpl = allTemplates.find(t => t.key === activeTemplateKey);
        if (tmpl) tmpl.body = body;

        result.innerHTML = '<div class="result-ok">✅ Template saved!</div>';
      } catch (e) {
        result.innerHTML = `<div class="result-err">❌ Error: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save Template';
      }
    }

    // ── Blast ─────────────────────────────────────────────────────
    let blastLoaded = false;
    async function loadBlast() {
      if (blastLoaded) return;
      blastLoaded = true;
      try {
        const [tRes, gRes] = await Promise.all([
          fetch(`${API_BASE}/api/templates`, { headers: HEADERS }),
          fetch(`${API_BASE}/api/webapp/linked-agents`, { headers: HEADERS })
        ]);
        if (tRes.ok) {
          const td = await tRes.json();
          const blastTmpl = td.templates.find(t => t.key === 'blast');
          document.getElementById('blast-preview').textContent =
            blastTmpl ? blastTmpl.body : '(No blast template found)';
        }
        if (gRes.ok) {
          const gd = await gRes.json();
          document.getElementById('blast-target').textContent =
            `Sending to ${gd.total} linked group(s)`;
        }
      } catch (_) {}
    }

    async function confirmBlast() {
      const msg = document.getElementById('blast-msg').value.trim();
      if (!msg) { tg.showAlert('Please type a message first.'); return; }

      tg.showConfirm('Send blast to ALL linked groups?', async (confirmed) => {
        if (!confirmed) return;
        const btn = document.getElementById('blast-btn');
        const result = document.getElementById('blast-result');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        result.textContent = '';

        try {
          const res = await fetch(`${API_BASE}/api/blast`, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify({ message: msg })
          });
          if (!res.ok) throw new Error(`${res.status}`);
          const data = await res.json();
          result.innerHTML = `<div class="result-ok">✅ Sent to ${data.sent}/${data.total} groups</div>`;
          document.getElementById('blast-msg').value = '';
        } catch (e) {
          result.innerHTML = `<div class="result-err">❌ Error: ${e.message}</div>`;
        } finally {
          btn.disabled = false;
          btn.textContent = '📢 Send to All Groups';
        }
      });
    }

    // ── Init ─────────────────────────────────────────────────────
    loadHome();
  </script>

</body>
</html>
