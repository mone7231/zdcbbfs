<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 20px;
    }

    h2 { font-size: 20px; margin-bottom: 6px; }

    .subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 20px;
    }

    .card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-label {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 4px;
    }

    .card-value {
      font-size: 22px;
      font-weight: bold;
      color: var(--tg-theme-text-color, #000);
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
    }

    .btn-secondary {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000000);
    }

    /* Linked Agents Panel */
    #linked-panel {
      display: none;
      margin-top: 20px;
    }

    .panel-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .agent-item {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }

    .agent-id {
      font-size: 14px;
      font-weight: bold;
    }

    .agent-group {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      margin-top: 2px;
    }

    .agent-meta {
      font-size: 11px;
      color: var(--tg-theme-hint-color, #aaa);
      margin-top: 4px;
    }

    .loading {
      text-align: center;
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      padding: 20px 0;
    }

    .error-msg {
      text-align: center;
      font-size: 13px;
      color: #e74c3c;
      padding: 12px;
    }

    .badge-linked {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #d5f5e3;
      color: #1e8449;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <h2>Finance Bot</h2>
  <p class="subtitle" id="greeting">Hello!</p>

  <!-- Summary Card -->
  <div class="card">
    <div class="card-label">Linked Groups</div>
    <div class="card-value" id="linked-count">—</div>
  </div>

  <!-- Show Linked Button -->
  <button class="btn btn-primary" id="btn-show-linked" onclick="loadLinkedAgents()">
    View Linked Agents 🔗
  </button>

  <!-- Linked Agents Panel -->
  <div id="linked-panel">
    <div class="panel-title" style="margin-top:20px;">Linked Agents</div>
    <div id="linked-list"></div>
    <button class="btn btn-secondary" onclick="hideLinkedPanel()">Hide ▲</button>
  </div>

  <button class="btn btn-secondary" style="margin-top:12px;" onclick="window.Telegram.WebApp.close()">Close</button>

  <script>
    // ── CONFIG ──────────────────────────────────────────
    const API_BASE = "https://poster-assume-brought-morning.trycloudflare.com";
    const API_KEY  = "mdbo-secure-key-2024";
    // ────────────────────────────────────────────────────

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    if (user?.first_name) {
      document.getElementById('greeting').textContent = 'Hello, ' + user.first_name + '!';
    }

    async function loadLinkedAgents() {
      const panel = document.getElementById('linked-panel');
      const list  = document.getElementById('linked-list');
      const btn   = document.getElementById('btn-show-linked');

      panel.style.display = 'block';
      btn.style.display = 'none';
      list.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`${API_BASE}/api/webapp/linked-agents`, {
          headers: { 'x-api-key': API_KEY }
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();

        document.getElementById('linked-count').textContent = data.total;

        if (data.agents.length === 0) {
          list.innerHTML = '<div class="loading">No linked agents yet.</div>';
          return;
        }

        list.innerHTML = data.agents.map(a => `
          <div class="agent-item">
            <div class="agent-id">Agent #${a.agent_id}</div>
            <div class="agent-group">📋 ${a.group_name}</div>
            <div class="agent-meta">Activated by: ${a.activated_by} · ${a.linked_at}</div>
            <span class="badge-linked">Linked</span>
          </div>
        `).join('');

      } catch (err) {
        list.innerHTML = `<div class="error-msg">Failed to load: ${err.message}</div>`;
      }
    }

    function hideLinkedPanel() {
      document.getElementById('linked-panel').style.display = 'none';
      document.getElementById('btn-show-linked').style.display = 'block';
    }

    // Auto-load count on open
    async function loadCount() {
      try {
        const res = await fetch(`${API_BASE}/api/webapp/linked-agents`, {
          headers: { 'x-api-key': API_KEY }
        });
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('linked-count').textContent = data.total;
      } catch (_) {}
    }
    loadCount();
  </script>

</body>
</html>
